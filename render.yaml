services:
  - type: web
    name: rupiya-loan-portfolio
    runtime: node
    region: singapore
    plan: free
    rootDir: completionist
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_API_KEY
        sync: false
